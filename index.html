    <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--volt);margin-bottom:6px">Étape importante</div>
    <div style="font-size:13px;color:var(--text);margin-bottom:14px;line-height:1.5">Définis un mot de passe pour te connecter facilement la prochaine fois.</div>
    <label class="field-label">Nouveau mot de passe</label>
    <input type="password" class="fld" id="pf-newpwd" placeholder="Minimum 8 caractères" style="margin-bottom:8px">
    <input type="password" class="fld" id="pf-newpwd2" placeholder="Confirme" style="margin-bottom:12px">
    <button class="btn btn-volt" onclick="handleSetPassword()" style="margin-bottom:0">Enregistrer le mot de passe</button>
    <div id="pwd-msg" style="margin-top:8px;font-size:13px;text-align:center;min-height:16px"></div>
  </div>`:''}

  <div class="auth-card" style="margin-bottom:12px">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Avatar</div>
    <div style="font-size:40px;text-align:center;margin-bottom:10px" id="avatar-big">${editAvatar}</div>
    <div class="avatar-grid">${AVATAR_OPTS.map(a=>`<div onclick="pickAvatar('${a}')" class="avatar-opt${a===editAvatar?' selected':''}" id="av-${a}">${a}</div>`).join('')}</div>
  </div>

  <div class="auth-card" style="margin-bottom:12px">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Identité</div>
    ${['prenom:Prénom','nom:Nom','pseudo:Pseudo','code_postal:Code postal'].map(f=>{const[k,l]=f.split(':');return`<div style="margin-bottom:10px"><label class="field-label">${l}</label><input type="text" class="fld" id="pf-${k}" value="${esc(p[k]||'')}" placeholder="${l}"></div>`;}).join('')}
    <div style="margin-bottom:10px">
      <label class="field-label">Niveau de jeu</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px" id="niv-picker">
        ${[['debutant','🌱 Débutant'],['intermediaire','⚡ Intermédiaire'],['confirme','🔥 Confirmé'],['avance','💎 Avancé'],['expert','👑 Expert']].map(([v,l])=>`<button type="button" onclick="pickNiveau('${v}')" id="niv-${v}" style="padding:6px 12px;border-radius:20px;border:1px solid ${(p.niveau||'')===v?'var(--volt)':'var(--border)'};background:${(p.niveau||'')===v?'var(--volt-dim)':'transparent'};font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:${(p.niveau||'')===v?'var(--volt)':'var(--muted)'};cursor:pointer">${l}</button>`).join('')}
      </div>
    </div>
    <label class="field-label">Description</label>
    <textarea class="fld" id="pf-description" rows="3" placeholder="Ton style de jeu..." style="resize:none">${esc(p.description||'')}</textarea>
  </div>

  ${!isNew?`<div class="auth-card" style="margin-bottom:12px">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Changer le mot de passe</div>
    <input type="password" class="fld" id="pf-newpwd" placeholder="Nouveau mot de passe" style="margin-bottom:8px">
    <input type="password" class="fld" id="pf-newpwd2" placeholder="Confirme" style="margin-bottom:12px">
    <button class="btn btn-ghost" onclick="handleSetPassword()" style="margin-bottom:0">Mettre à jour</button>
    <div id="pwd-msg" style="margin-top:8px;font-size:13px;text-align:center;min-height:16px"></div>
  </div>`:''}

  <button class="btn btn-volt" onclick="handleSaveProfile()">Enregistrer le profil</button>
  <button class="btn btn-ghost" onclick="handleSignOut()">Se déconnecter</button>`;
}

let selectedNiveau='';
function pickNiveau(v){
  selectedNiveau=v;
  ['debutant','intermediaire','confirme','avance','expert'].forEach(n=>{
    const el=document.getElementById('niv-'+n);
    if(!el)return;
    const active=n===v;
    el.style.borderColor=active?'var(--volt)':'var(--border)';
    el.style.background=active?'var(--volt-dim)':'transparent';
    el.style.color=active?'var(--volt)':'var(--muted)';
  });
}

function pickAvatar(e){editAvatar=e;document.getElementById('avatar-big').textContent=e;document.getElementById('hero-ava').textContent=e;AVATAR_OPTS.forEach(a=>{const el=document.getElementById('av-'+a);if(el){el.classList.toggle('selected',a===e);}});}

async function handleSetPassword(){
  const pwd=document.getElementById('pf-newpwd')?.value||'';
  const pwd2=document.getElementById('pf-newpwd2')?.value||'';
  const msg=document.getElementById('pwd-msg');
  if(!pwd||pwd.length<8){msg.textContent='Minimum 8 caractères.';msg.style.color='var(--pink)';return;}
  if(pwd!==pwd2){msg.textContent='Les mots de passe ne correspondent pas.';msg.style.color='var(--pink)';return;}
  const token=localStorage.getItem('sq_token');
  msg.textContent='Enregistrement...';msg.style.color='var(--muted)';
  try{
    const r=await fetch(SUPA_URL+'/auth/v1/user',{method:'PUT',headers:{...HEADERS,'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({password:pwd})});
    if(!r.ok)throw new Error(await r.text());
    msg.textContent='✅ Mot de passe enregistré !';msg.style.color='var(--volt)';
    document.getElementById('pf-newpwd').value='';document.getElementById('pf-newpwd2').value='';
  }catch(e){msg.textContent='Erreur : '+e.message.slice(0,60);msg.style.color='var(--pink)';}
}

async function handleSaveProfile(){
  if(!currentUser)return;
  const token=localStorage.getItem('sq_token');
  const data={avatar:editAvatar,prenom:document.getElementById('pf-prenom').value.trim(),nom:document.getElementById('pf-nom').value.trim(),pseudo:document.getElementById('pf-pseudo').value.trim().replace('@',''),code_postal:document.getElementById('pf-code_postal').value.trim(),description:document.getElementById('pf-description').value.trim(),niveau:selectedNiveau||currentProfile?.niveau||'',email:currentUser.email,updated_at:new Date().toISOString()};
  setSyncDot('loading');
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/profiles?id=eq.'+currentUser.id,{method:'PATCH',headers:{...HEADERS,'Authorization':'Bearer '+token,'Prefer':'return=representation'},body:JSON.stringify(data)});
    if(!r.ok)throw new Error(await r.text());
    currentProfile={...currentProfile,...data};
    // Mettre à jour le nom dans MEMBERS si on est dans un groupe
    const me=MEMBERS.find(m=>m.id===currentUser.id);
    if(me){me.n=data.pseudo||(data.prenom+' '+data.nom).trim()||me.n;me.e=data.avatar||me.e;}
    setSyncDot('ok');updateDrawerUser();showToast('Profil sauvegardé !');
    renderProfileEdit(document.getElementById('profil-content'));
  }catch(e){setSyncDot('err');showToast('Erreur : '+e.message.slice(0,50),true);}
}

async function handleSignOut(){
  if(!confirm('Se déconnecter ?'))return;
  const token=localStorage.getItem('sq_token');
  if(token){await fetch(SUPA_URL+'/auth/v1/logout',{method:'POST',headers:{...HEADERS,'Authorization':'Bearer '+token}}).catch(()=>{});}
  localStorage.removeItem('sq_token');
  localStorage.removeItem('sq_active_group');
  currentUser=null;currentProfile=null;activeGroup=null;GROUPS=[];MEMBERS=[];MATCHES=[];
  updateDrawerUser();updateDrawerGroup();
  renderProfilPage();showToast('Déconnecté');
}

// ═══ ÉVALUATION ÉTOILES ═══
let starRatings={}; // { userId: stars }

async function openRatingsPage(){
  if(!activeGroup||!currentUser) return;

  // Créer overlay
  let overlay=document.getElementById('ratings-overlay');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='ratings-overlay';
    overlay.style.cssText='position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center';
    overlay.onclick=(e)=>{if(e.target===overlay)overlay.remove();};
    document.body.appendChild(overlay);
  }

  overlay.innerHTML=`<div style="background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)">
    <div style="width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0"></div>
    <div style="padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;text-transform:uppercase">Évaluer les joueurs</div>
      <button onclick="document.getElementById('ratings-overlay').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted)">×</button>
    </div>
    <div style="padding:8px 20px;font-size:13px;color:var(--muted);margin-bottom:4px">Note tes coéquipiers de 0.5 à 5 étoiles. Ces notes sont indépendantes des matchs.</div>
    <div id="star-ratings-list" style="padding:0 20px 24px">Chargement...</div>
  </div>`;

  // Charger les notes existantes que j'ai données dans ce groupe
  try{
    const token=localStorage.getItem('sq_token');
    const existing=await fetch(
      SUPA_URL+'/rest/v1/player_ratings?group_id=eq.'+activeGroup.id+'&rater_id=eq.'+currentUser.id,
      {headers:{...HEADERS,'Authorization':'Bearer '+token}}
    ).then(r=>r.json());

    starRatings={};
    existing.forEach(r=>{ starRatings[r.rated_id]=r.stars; });

    const toRate=MEMBERS.filter(m=>m.id!==currentUser.id);
    const list=document.getElementById('star-ratings-list');

    if(!toRate.length){
      list.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted)">Pas encore d\'autres membres à noter.</div>';
      return;
    }

    list.innerHTML=toRate.map(m=>{
      const currentStars=starRatings[m.id]||0;
      return `<div style="padding:14px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div style="font-size:22px;width:36px;height:36px;background:var(--surface2);border-radius:50%;display:flex;align-items:center;justify-content:center">${m.e||'⚽'}</div>
          <div>
            <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;text-transform:uppercase">${esc(m.n)}</div>
            ${m.niveau?`<div style="font-size:11px;color:var(--muted)">${{debutant:'🌱',intermediaire:'⚡',confirme:'🔥',avance:'💎',expert:'👑'}[m.niveau]||''} ${m.niveau}</div>`:''}
          </div>
          <div style="margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--volt)" id="star-val-${m.id}">${currentStars>0?currentStars.toFixed(1)+'★':'—'}</div>
        </div>
        <div id="stars-${m.id}" style="display:flex;gap:4px;justify-content:center">
          ${[0.5,1,1.5,2,2.5,3,3.5,4,4.5,5].map(v=>{
            const filled=currentStars>=v;
            const isHalf=v%1!==0;
            return `<button onclick="setStarRating('${m.id}',${v})"
              style="background:none;border:none;cursor:pointer;padding:2px;font-size:${isHalf?'18px':'22px'};opacity:${filled?1:0.25};transition:opacity .1s;transform:${isHalf?'scaleX(0.6)':''};margin:${isHalf?'0 -4px':''}"
              title="${v}★">★</button>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');

    // Bouton sauvegarder global
    list.innerHTML+=`<button class="btn btn-volt" onclick="saveAllStarRatings()" style="margin-top:16px">Enregistrer mes évaluations</button>`;

  }catch(e){
    document.getElementById('star-ratings-list').innerHTML='<div style="color:var(--pink);padding:20px;text-align:center">Erreur de chargement</div>';
    console.error('openRatingsPage:',e);
  }
}

function setStarRating(userId, stars){
  starRatings[userId]=stars;
  // Mettre à jour l'affichage
  const val=document.getElementById('star-val-'+userId);
  if(val) val.textContent=stars.toFixed(1)+'★';
  const starsDiv=document.getElementById('stars-'+userId);
  if(!starsDiv) return;
  starsDiv.querySelectorAll('button').forEach(btn=>{
    const v=parseFloat(btn.getAttribute('title'));
    btn.style.opacity=stars>=v?'1':'0.25';
  });
}

async function saveAllStarRatings(){
  if(!activeGroup||!currentUser) return;
  const token=localStorage.getItem('sq_token');
  const entries=Object.entries(starRatings).filter(([,s])=>s>0);
  if(!entries.length){showToast('Note au moins un joueur',true);return;}
  setSyncDot('loading');
  try{
    // Upsert chaque note
    for(const [ratedId,stars] of entries){
      await fetch(SUPA_URL+'/rest/v1/player_ratings',{
        method:'POST',
        headers:{...HEADERS,'Authorization':'Bearer '+token,'Prefer':'resolution=merge-duplicates,return=minimal','Content-Type':'application/json','on-conflict':'group_id,rater_id,rated_id'},
        body:JSON.stringify({
          group_id:activeGroup.id,
          rater_id:currentUser.id,
          rated_id:ratedId,
          stars,
          updated_at:new Date().toISOString()
        })
      });
    }
    setSyncDot('ok');
    showToast('Évaluations enregistrées !');
    document.getElementById('ratings-overlay')?.remove();
  }catch(e){
    setSyncDot('err');
    showToast('Erreur : '+e.message.slice(0,40),true);
  }
}

// ═══ NOTATION (lien post-match) ═══
async function initRatingPage(matchId){
  document.querySelector('.burger').style.display='none';
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-notation').classList.add('active');
  const el=document.getElementById('notation-content');
  el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">Chargement...</div>';
  try{
    const matches=await fetch(SUPA_URL+'/rest/v1/matches?id=eq.'+matchId,{headers:HEADERS}).then(r=>r.json());
    if(!matches.length){el.innerHTML='<p style="color:var(--pink);text-align:center;padding:40px">Match introuvable.</p>';return;}
    const match=matches[0];
    const allPlayers=[...(match.team_a||[]),...(match.team_b||[])];
    const d=new Date(match.date).toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
    el.innerHTML=`<div style="text-align:center;padding:24px 0 16px"><div style="font-size:36px">⭐</div><div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;text-transform:uppercase;margin-top:8px">Notation du match</div><div style="font-size:13px;color:var(--muted);margin-top:4px">${d} — ${match.score_a} - ${match.score_b}</div></div><div class="info-box">Sélectionne ton prénom pour noter tes coéquipiers.</div><div style="display:flex;flex-direction:column;gap:8px">${allPlayers.map(name=>`<button onclick="startRating(${matchId},'${name.replace(/'/g,"\\'")}')" style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;color:var(--text);text-align:left;width:100%"><span style="font-size:24px">⚽</span><span>${esc(name)}</span></button>`).join('')}</div>`;
  }catch(e){el.innerHTML='<p style="color:var(--pink);text-align:center;padding:40px">Erreur.</p>';}
}

let ratingScores={};
async function startRating(matchId,joueurName){
  const el=document.getElementById('notation-content');
  el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">Chargement...</div>';
  try{
    const matches=await fetch(SUPA_URL+'/rest/v1/matches?id=eq.'+matchId,{headers:HEADERS}).then(r=>r.json());
    const match=matches[0];
    const toRate=[...(match.team_a||[]),...(match.team_b||[])].filter(n=>n!==joueurName);
    const d=new Date(match.date).toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
    const existing=await fetch(SUPA_URL+'/rest/v1/ratings?match_id=eq.'+matchId+'&rater_name=eq.'+encodeURIComponent(joueurName),{headers:HEADERS}).then(r=>r.json());
    if(existing.length){el.innerHTML='<div style="text-align:center;padding:60px 16px"><div style="font-size:52px;margin-bottom:16px">✅</div><div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:20px;text-transform:uppercase;margin-bottom:8px">Déjà noté !</div><div style="font-size:14px;color:var(--muted)">Tu as déjà noté ce match.</div></div>';return;}
    ratingScores={};toRate.forEach(n=>{ratingScores[n]={atk:0,def:0,phy:0};});
    let html=`<div style="display:flex;align-items:center;gap:10px;padding:16px 0 12px"><button onclick="initRatingPage(${matchId})" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)">←</button><div><div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;text-transform:uppercase">⚽ ${esc(joueurName)}</div><div style="font-size:12px;color:var(--muted)">Match du ${d}</div></div></div>`;
    html+=`<div class="info-box">Note chaque joueur (1 à 5 ★). Anonyme.</div>`;
    toRate.forEach(name=>{const sid=name.replace(/[^a-zA-Z0-9]/g,'_');html+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px" id="rc-${sid}"><div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;margin-bottom:10px">⚽ ${esc(name)}</div>${[{k:'atk',l:'Attaque'},{k:'def',l:'Défense'},{k:'phy',l:'Physique'}].map(({k,l})=>`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)">${l}</span><div id="stars-${sid}-${k}" style="display:flex;gap:4px">${[1,2,3,4,5].map(v=>`<span onclick="setStar('${sid}','${k}','${name.replace(/'/g,"\\'")}',${v})" style="font-size:26px;cursor:pointer;color:var(--surface3)">★</span>`).join('')}</div></div>`).join('')}</div>`;});
    html+=`<button class="btn btn-volt" onclick="submitRatings(${matchId},'${joueurName.replace(/'/g,"\\'")}')">Envoyer mes notes</button>`;
    el.innerHTML=html;
  }catch(e){el.innerHTML='<p style="color:var(--pink);text-align:center;padding:40px">Erreur.</p>';}
}

function setStar(sid,crit,realName,val){ratingScores[realName][crit]=val;const c=document.getElementById('stars-'+sid+'-'+crit);if(c)c.querySelectorAll('span').forEach((s,i)=>s.style.color=i<val?'var(--volt)':'var(--surface3)');}

async function submitRatings(matchId,raterName){
  const toRate=Object.keys(ratingScores);
  const incomplete=toRate.filter(n=>!ratingScores[n].atk||!ratingScores[n].def||!ratingScores[n].phy);
  if(incomplete.length){showToast('Note tous les joueurs !',true);return;}
  try{
    const matches=await fetch(SUPA_URL+'/rest/v1/matches?id=eq.'+matchId,{headers:HEADERS}).then(r=>r.json());
    const gid=matches[0]?.group_id;
    const rows=toRate.map(n=>({match_id:matchId,group_id:gid,rater_name:raterName,rated_name:n,...ratingScores[n]}));
    await fetch(SUPA_URL+'/rest/v1/ratings',{method:'POST',headers:{...HEADERS,'Prefer':'return=minimal'},body:JSON.stringify(rows)});
    document.getElementById('notation-content').innerHTML='<div style="text-align:center;padding:60px 16px"><div style="font-size:56px;margin-bottom:16px">✅</div><div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:22px;text-transform:uppercase;margin-bottom:8px">Notes envoyées !</div><div style="font-size:14px;color:var(--muted)">Merci '+esc(raterName)+'. Tes notes sont anonymes.</div></div>';
  }catch(e){showToast('Erreur envoi.',true);}
}

document.addEventListener('DOMContentLoaded',()=>init());
</script>
</body>
</html>
